---
# =============================================================
# k3s-install.yml — Bootstrap K3s Cluster
# Installs K3s server on master, agents on workers
# =============================================================

- name: Install K3s on master node
  hosts: masters
  become: true

  vars:
    k3s_version: "v1.29.4+k3s1"
    k3s_server_args: >-
      --disable traefik
      --disable servicelb
      --flannel-backend=vxlan
      --cluster-cidr=10.42.0.0/16
      --service-cidr=10.43.0.0/16

  tasks:
    - name: Download and install K3s server
      shell: |
        curl -sfL https://get.k3s.io | \
        INSTALL_K3S_VERSION="{{ k3s_version }}" \
        INSTALL_K3S_EXEC="server {{ k3s_server_args }}" \
        sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for K3s to be ready
      wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        timeout: 60

    - name: Fetch node token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token

    - name: Fetch kubeconfig
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ playbook_dir }}/../../kubeconfig.yml"
        flat: yes

    - name: Set fact — node token
      set_fact:
        k3s_node_token: "{{ k3s_token.content | b64decode | trim }}"

    - name: Verify master is Ready
      command: k3s kubectl get nodes
      register: nodes_output
      retries: 5
      delay: 10
      until: "'Ready' in nodes_output.stdout"


- name: Install K3s agents on worker nodes
  hosts: workers
  become: true

  vars:
    k3s_version: "v1.29.4+k3s1"
    master_ip: "{{ hostvars['master-1']['ansible_host'] }}"

  tasks:
    - name: Download and install K3s agent
      shell: |
        curl -sfL https://get.k3s.io | \
        INSTALL_K3S_VERSION="{{ k3s_version }}" \
        K3S_URL="https://{{ master_ip }}:6443" \
        K3S_TOKEN="{{ hostvars['master-1']['k3s_node_token'] }}" \
        sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Ensure k3s-agent service is enabled and running
      systemd:
        name: k3s-agent
        state: started
        enabled: yes


- name: Post-install — verify all nodes joined
  hosts: masters
  become: true

  tasks:
    - name: List all cluster nodes
      command: k3s kubectl get nodes -o wide
      register: cluster_nodes

    - name: Print node list
      debug:
        msg: "{{ cluster_nodes.stdout_lines }}"
